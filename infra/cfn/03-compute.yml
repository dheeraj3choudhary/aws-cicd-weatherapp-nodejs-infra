AWSTemplateFormatVersion: '2010-09-09'
Description: 03-compute.yml - EC2 instance for weather-app

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
    Description: EC2 instance type

Resources:

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !ImportValue weather-app-public-subnet-id
      SecurityGroupIds:
        - !ImportValue weather-app-sg-id
      IamInstanceProfile: weather-app-ec2-instance-profile
      Tags:
        - Key: Name
          Value: weather-app-ec2
        - Key: App
          Value: weather-app
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Update system
          yum update -y

          # Install Ruby (required by CodeDeploy agent)
          yum install -y ruby wget

          # Install CodeDeploy agent
          cd /home/ec2-user
          wget https://aws-codedeploy-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/install
          chmod +x ./install
          ./install auto

          # Start and enable CodeDeploy agent
          systemctl start codedeploy-agent
          systemctl enable codedeploy-agent

          # Install Docker
          yum install -y docker
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

  # CodeDeploy Application
  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: weather-app
      ComputePlatform: Server

  # CodeDeploy Deployment Group
  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: weather-app-deployment-group
      ServiceRoleArn: !ImportValue weather-app-codedeploy-role-arn
      DeploymentConfigName: CodeDeployDefault.AllAtOnce
      DeploymentStyle:
        DeploymentType: IN_PLACE
        DeploymentOption: WITHOUT_TRAFFIC_CONTROL
      Ec2TagFilters:
        - Key: App
          Value: weather-app
          Type: KEY_AND_VALUE

Outputs:
  EC2InstanceId:
    Value: !Ref EC2Instance
    Export:
      Name: weather-app-ec2-instance-id

  EC2PublicIP:
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: weather-app-ec2-public-ip

  EC2PublicDNS:
    Value: !GetAtt EC2Instance.PublicDnsName
    Export:
      Name: weather-app-ec2-public-dns

  CodeDeployApplicationName:
    Value: !Ref CodeDeployApplication
    Export:
      Name: weather-app-codedeploy-app

  CodeDeployDeploymentGroupName:
    Value: !Ref CodeDeployDeploymentGroup
    Export:
      Name: weather-app-codedeploy-group