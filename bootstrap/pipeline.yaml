AWSTemplateFormatVersion: '2010-09-09'
Description: Bootstrap template - creates infra pipeline and app pipeline for weather-app

Parameters:
  InfraRepoName:
    Type: String
    Default: weather-app-infra
    Description: Existing CodeCommit repository name
  RepoName:
    Type: String
    Default: weather-application
    Description: Existing CodeCommit repository name

  BranchName:
    Type: String
    Default: master
    Description: Branch to trigger pipelines from

Resources:

  # -------------------------------------------------------
  # S3 Artifact Bucket
  # -------------------------------------------------------
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub weather-app-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # -------------------------------------------------------
  # IAM Role - CodePipeline
  # -------------------------------------------------------
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: weather-app-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:UploadArchive
                  - codecommit:GetUploadArchiveStatus
                  - codecommit:CancelUploadArchive
                Resource:
                  - !Sub arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${RepoName}
                  - !Sub arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${InfraRepoName}
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: "*"
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationRole.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*


  # -------------------------------------------------------
  # IAM Role - CodeBuild (Infra Validate)
  # -------------------------------------------------------
  CodeBuildInfraRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: weather-app-codebuild-infra-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildInfraPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                Resource: "*"

  # -------------------------------------------------------
  # IAM Role - CodeBuild (App Build)
  # -------------------------------------------------------
  CodeBuildAppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: weather-app-codebuild-app-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildAppPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: "*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/weather-app/*

  # -------------------------------------------------------
  # IAM Role - CloudFormation (Deploy Infra Stacks)
  # -------------------------------------------------------
  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: weather-app-cloudformation-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # -------------------------------------------------------
  # CodeBuild Project - Infra Validate
  # -------------------------------------------------------
  InfraValidateProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: weather-app-infra-validate
      ServiceRole: !GetAtt CodeBuildInfraRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: infra/buildspec-validate.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/weather-app-infra-validate

  # -------------------------------------------------------
  # CodeBuild Project - App Build
  # -------------------------------------------------------
  AppBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: weather-app-build
      ServiceRole: !GetAtt CodeBuildAppRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/weather-app-build

  # -------------------------------------------------------
  # Infra Pipeline
  # -------------------------------------------------------
  InfraPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: weather-app-infra-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: '1'
              Configuration:
                RepositoryName: !Ref InfraRepoName
                BranchName: !Ref BranchName
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

        - Name: Validate
          Actions:
            - Name: ValidateCFNTemplates
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref InfraValidateProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: ValidatedOutput
              RunOrder: 1

        - Name: Deploy-Infra
          Actions:
            - Name: DeployIAM
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: weather-app-iam
                TemplatePath: SourceOutput::infra/cfn/01-iam.yml
                RoleArn: !GetAtt CloudFormationRole.Arn
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

            - Name: DeployNetworking
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: weather-app-networking
                TemplatePath: SourceOutput::infra/cfn/02-networking.yml
                RoleArn: !GetAtt CloudFormationRole.Arn
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 2

            - Name: DeployCompute
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: weather-app-compute
                TemplatePath: SourceOutput::infra/cfn/03-compute.yml
                RoleArn: !GetAtt CloudFormationRole.Arn
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 3

            - Name: DeployECRS3
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: weather-app-ecr-s3
                TemplatePath: SourceOutput::infra/cfn/04-ecr-s3.yml
                RoleArn: !GetAtt CloudFormationRole.Arn
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 3

            - Name: DeployMonitoring
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: weather-app-monitoring
                TemplatePath: SourceOutput::infra/cfn/05-monitoring.yml
                RoleArn: !GetAtt CloudFormationRole.Arn
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 4
  # -------------------------------------------------------
  # App Pipeline
  # -------------------------------------------------------
  AppPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: weather-app-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: '1'
              Configuration:
                RepositoryName: !Ref RepoName
                BranchName: !Ref BranchName
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

        - Name: Build
          Actions:
            - Name: BuildAndPushDocker
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref AppBuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

        - Name: Deploy
          Actions:
            - Name: DeployToEC2
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeploy
                Version: '1'
              Configuration:
                ApplicationName: weather-app
                DeploymentGroupName: weather-app-deployment-group
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

  # -------------------------------------------------------
  # EventBridge Rules - Trigger pipelines on path changes
  # -------------------------------------------------------
  InfraPipelineTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: weather-app-infra-trigger-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TriggerPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource:
                  - !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:weather-app-infra-pipeline
                  - !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:weather-app-pipeline

  InfraPipelineTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: weather-app-infra-trigger
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - CodeCommit Repository State Change
        resources:
          - !Sub arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${InfraRepoName}
        detail:
          event:
            - referenceUpdated
          referenceName:
            - !Ref BranchName
          referenceType:
            - branch
          filePathsChanged:
            - prefix: infra/
      Targets:
        - Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:weather-app-infra-pipeline
          Id: InfraPipelineTarget
          RoleArn: !GetAtt InfraPipelineTriggerRole.Arn

  AppPipelineTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: weather-app-app-trigger
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - CodeCommit Repository State Change
        resources:
          - !Sub arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${RepoName}
        detail:
          event:
            - referenceUpdated
          referenceName:
            - !Ref BranchName
          referenceType:
            - branch
          filePathsChanged:
            - prefix: app/
      Targets:
        - Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:weather-app-pipeline
          Id: AppPipelineTarget
          RoleArn: !GetAtt InfraPipelineTriggerRole.Arn

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------
Outputs:
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
    Export:
      Name: weather-app-artifact-bucket

  InfraPipelineName:
    Value: !Ref InfraPipeline
    Export:
      Name: weather-app-infra-pipeline

  AppPipelineName:
    Value: !Ref AppPipeline
    Export:
      Name: weather-app-pipeline

  CloudFormationRoleArn:
    Value: !GetAtt CloudFormationRole.Arn
    Export:
      Name: weather-app-cfn-role-arn